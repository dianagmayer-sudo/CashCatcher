{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-4">

<h2 class="mb-4">Login</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-primary w-100">
        Login
    </button>
</form>

<p class="mt-3">
<a href="{% url 'password_reset' %}">
Forgot your password?
</a>
</p>

</div>
</div>

{% endblock %}
