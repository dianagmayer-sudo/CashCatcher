<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashCatcher</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#F4F1EA;
    font-family: system-ui, -apple-system, sans-serif;
}

/* NAVBAR */
.navbar{
    background:#4B3F2F !important;
    padding:14px 0;
}

/* BRAND */
.navbar-brand{
    font-size:22px;
    letter-spacing:0.5px;
}

/* LINKS */
.nav-link{
    font-weight:500;
    opacity:0.9;
}

.nav-link:hover{
    opacity:1;
}

/* BUTTONS GLOBAL */
.btn{
    border-radius:10px;
    padding:6px 14px;
    transition:0.2s;
}

/* PRIMARY */
.btn-primary{
    background:#4F6F52;
    border:none;
}

.btn-primary:hover{
    background:#3f5942;
}

/* SUCCESS (Add) */
.btn-success{
    background:#739072;
    border:none;
}

.btn-success:hover{
    background:#5f7c63;
}

/* EDIT */
.btn-warning{
    background:#C2A878;
    border:none;
    color:white;
}

.btn-warning:hover{
    background:#a89263;
    color:white;
}

/* DELETE */
.btn-danger{
    background:#A44A3F;
    border:none;
}

.btn-danger:hover{
    background:#8a3d34;
}

/* CARD */
.card{
    border:none;
    border-radius:18px;
}

/* MINIMAL INPUT */
input, select{
    border:none !important;
    border-bottom:1px solid #d6d6d6 !important;
    border-radius:0 !important;
    background:transparent !important;
    padding-left:0 !important;
}

input:focus, select:focus{
    outline:none !important;
    box-shadow:none !important;
    border-bottom:1px solid #4F6F52 !important;
}

/* CONTAINER SPACING */
.container{
    max-width:1100px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="{% url 'home' %}">
💰 CashCatcher
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav me-auto">

{% if user.is_authenticated %}

<li class="nav-item">
<a class="nav-link" href="{% url 'dashboard' %}">
Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'transactions_list' %}">
Transactions
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'categories_list' %}">
Categories
</a>
</li>

{% endif %}

</ul>

<div class="d-flex align-items-center gap-2">

{% if user.is_authenticated %}

<span class="text-white me-2">
Hi {{ user.first_name }}
</span>

<form method="post" action="{% url 'logout' %}">
{% csrf_token %}
<button type="submit" class="btn btn-outline-light btn-sm">
Logout
</button>
</form>

{% else %}

<a href="{% url 'login' %}" class="btn btn-outline-light">
Login
</a>

<a href="{% url 'register' %}" class="btn btn-primary">
Register
</a>

{% endif %}

</div>

</div>
</div>
</nav>

<div class="container mt-4 mb-5">
{% block content %}
{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
